name: Execute Automation Build
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  run_sh_and_compile:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Run Single File Automation Project Creator
      run: |
        chmod +x build_app.sh
        ./build_app.sh

    - name: Setup Java Environment
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Validate Project Directory Structure
      run: |
        ls -la
        if [ -d "app" ]; then echo "App folder exists"; else echo "App folder MISSING"; fi

    - name: Force Gradle Wrapper Generation
      run: |
        gradle wrapper --gradle-version 8.4

    - name: Compile Real APK Now
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: ATM-NEET-LOCKDOWN-SINGLE-FILE-BUILD
        path: "**/build/outputs/apk/debug/*.apk"
