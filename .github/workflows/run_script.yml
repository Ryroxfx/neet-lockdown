name: Generate Android App APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Initialize Complete Gradle Project
      run: |
        # Project structures setup
        mkdir -p gradle/wrapper
        mkdir -p app/src/main/java/com/atm/neetlockdown
        mkdir -p app/src/main/res/values

        # Generate local wrapper configs
        cat << 'EOF' > gradle/wrapper/gradle-wrapper.properties
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF

        # Base root configuration
        cat << 'EOF' > build.gradle.kts
        plugins {
            id("com.android.application") version "8.1.2" apply false
            id("org.jetbrains.kotlin.android") version "1.8.22" apply false
        }
        EOF

        cat << 'EOF' > settings.gradle.kts
        pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories { google(); mavenCentral() }
        }
        rootProject.name = "atm-neet-lockdown"
        include(":app")
        EOF

        # Sub-app structural layout
        cat << 'EOF' > app/build.gradle.kts
        plugins {
            id("com.android.application")
            id("org.jetbrains.kotlin.android")
        }
        android {
            namespace = "com.atm.neetlockdown"
            compileSdk = 33
            defaultConfig {
                applicationId = "com.atm.neetlockdown"
                minSdk = 26
                targetSdk = 33
                versionCode = 1
                versionName = "1.0.0"
            }
            compileOptions {
                sourceCompatibility = JavaVersion.VERSION_11
                targetCompatibility = JavaVersion.VERSION_11
            }
            kotlinOptions { jvmTarget = "11" }
        }
        dependencies {
            implementation("androidx.core:core-ktx:1.10.1")
            implementation("androidx.appcompat:appcompat:1.6.1")
        }
        EOF

    - name: Inject Android Manifest and Base Resources
      run: |
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.atm.neetlockdown">
            <application
                android:label="A.T.M. NEET LOCKDOWN"
                android:supportsRtl="true"
                android:theme="@style/Theme.AppCompat.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        cat << 'EOF' > app/src/main/res/values/themes.xml
        <resources>
            <style name="Theme.AppCompat.NoActionBar" parent="Theme.AppCompat.Light.NoActionBar" />
        </resources>
        EOF

    - name: Inject Native Activity Source Code
      run: |
        cat << 'EOF' > app/src/main/java/com/atm/neetlockdown/MainActivity.kt
        package com.atm.neetlockdown
        import android.os.Bundle
        import androidx.appcompat.app.AppCompatActivity
        import android.widget.TextView
        import android.view.Gravity

        class MainActivity : AppCompatActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
                super.onCreate(savedInstanceState)
                val textView = TextView(this).apply {
                    text = "A.T.M. OPERATING ENVIRONMENT v1.0\nSYSTEM PROTECTION STATUS: ACTIVE"
                    textSize = 18f
                    gravity = Gravity.CENTER
                    setPadding(32, 32, 32, 32)
                }
                setContentView(textView)
            }
        }
        EOF

    - name: Setup Gradle Environment and Force Compilation
      run: |
        # Download and fix missing execution wrappers locally inside environment 
        gradle wrapper --gradle-version 8.2
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Export Output App Bundle Artifact
      uses: actions/upload-artifact@v4
      with:
        name: NEET-LOCKDOWN-APP-APK
        path: "**/build/outputs/apk/debug/*.apk"
