name: Generate Android App APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Official Android Environment
      uses: gradle/actions/setup-gradle@v3

    - name: Create Base Project Structures
      run: |
        mkdir -p app/src/main/java/com/atm/neetlockdown
        
        # Creating valid build configuration files
        cat << 'EOF' > settings.gradle
        rootProject.name = "atm-neet-lockdown"
        include ':app'
        EOF

        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.0.2' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }
        EOF

        cat << 'EOF' > app/build.gradle
        apply plugin: 'com.android.application'
        android {
            namespace "com.atm.neetlockdown"
            compileSdkVersion 33
            defaultConfig {
                applicationId "com.atm.neetlockdown"
                minSdkVersion 26
                targetSdkVersion 33
                versionCode 1
                versionName "1.0"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
        }
        EOF

    - name: Write Native Manifest and Code
      run: |
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.atm.neetlockdown">
            <application android:label="A.T.M. NEET LOCKDOWN" android:theme="@android:style/Theme.DeviceDefault.NoActionBar">
                <activity android:name=".MainActivity" android:exported="true">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF

        cat << 'EOF' > app/src/main/java/com/atm/neetlockdown/MainActivity.java
        package com.atm.neetlockdown;
        import android.os.Bundle;
        import android.widget.TextView;
        import android.view.Gravity;
        import android.graphics.Color;

        public class MainActivity extends android.app.Activity {
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                TextView tv = new TextView(this);
                tv.setText("A.T.M. OPERATING ENVIRONMENT\nSTATUS: ACTIVE");
                tv.setTextSize(22);
                tv.setTextColor(Color.GREEN);
                tv.setBackgroundColor(Color.BLACK);
                tv.setGravity(Gravity.CENTER);
                setContentView(tv);
            }
        }
        EOF

    - name: Compile and Build App Bundle
      run: gradle assembleDebug --no-daemon

    - name: Export Output Artifact Package
      uses: actions/upload-artifact@v4
      with:
        name: NEET-LOCKDOWN-APP-APK
        path: "**/build/outputs/apk/debug/*.apk"
